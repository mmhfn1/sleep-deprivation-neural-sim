name: Tests & Documentation

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs ──────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Run the full Python test suite ─────────────────────────────────────
  test:
    name: Run Model Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install headless Qt + Python deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb1 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0 \
            xvfb
          pip install --upgrade pip
          pip install numpy scipy PyQt6 pyqtgraph

      - name: Run model-layer tests (no display required)
        run: |
          python tests/test_two_process.py
          python tests/test_spike_generator.py
          python tests/test_pharmacology.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "*.log"
          if-no-files-found: ignore

  # ── 2. Deploy docs to GitHub Pages ────────────────────────────────────────
  docs:
    name: Deploy Documentation
    needs: test                  # only deploy if tests pass
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject build metadata into docs
        run: |
          # Stamp the docs with the current commit SHA and date
          SHA="${{ github.sha }}"
          DATE=$(date -u +"%B %d, %Y")
          sed -i "s/{{BUILD_SHA}}/${SHA:0:7}/g"  docs/index.html
          sed -i "s/{{BUILD_DATE}}/${DATE}/g"    docs/index.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
